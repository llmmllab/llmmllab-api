apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmmllab-api
  namespace: llmmllab
  labels:
    app: llmmllab-api
spec:
  selector:
    matchLabels:
      app: llmmllab-api
  template:
    metadata:
      labels:
        app: llmmllab-api
    spec:
      imagePullSecrets:
        - name: registry-secret
      containers:
        - name: llmmllab
          image: 192.168.0.71:31500/llmmllab-api:latest
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 9999
              protocol: TCP
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              memory: "8Gi"
              cpu: "4"
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: hf-token
                  key: token
            - name: AUTH_ISSUER
              value: "https://auth.longstorymedia.com"
            - name: AUTH_AUDIENCE
              value: "lsm-client"
            - name: AUTH_CLIENT_ID
              value: "lsm-client"
            - name: AUTH_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: auth-client
                  key: client_secret
            - name: AUTH_JWKS_URI
              value: "https://auth.longstorymedia.com/keys"
            - name: DB_HOST
              value: "llmmllab-postgres.llmmllab.svc.cluster.local"
            - name: DB_PORT
              value: "5432"
            - name: DB_USER
              value: "lsm"
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: db-credentials
                  key: password
            - name: DB_NAME
              value: "llmmllab"
            - name: DB_SSLMODE
              value: "disable"
            - name: DB_REINDEX_ON_MAINTENANCE
              value: "true"
            - name: REDIS_ENABLED
              value: "true"
            - name: REDIS_HOST
              value: "192.168.0.71"
            - name: REDIS_PORT
              value: "32346"
            - name: REDIS_DB
              value: "0"
            - name: REDIS_CONVERSATION_TTL
              value: "360"
            - name: REDIS_MESSAGE_TTL
              value: "180"
            - name: REDIS_SUMMARY_TTL
              value: "720"
            - name: REDIS_POOL_SIZE
              value: "10"
            - name: REDIS_MIN_IDLE_CONNECTIONS
              value: "2"
            - name: REDIS_CONNECT_TIMEOUT
              value: "5"
            - name: MESSAGES_BEFORE_SUMMARY
              value: "6"
            - name: SUMMARIES_BEFORE_CONSOLIDATION
              value: "3"
            - name: MAX_SUMMARY_LEVELS
              value: "3"
            - name: SUMMARY_WEIGHT_COEFFICIENT
              value: "0.7"
            - name: IMAGE_GENERATION_ENABLED
              value: "true"
            - name: IMAGE_DIR
              value: "/root/images"
            - name: MAX_IMAGE_SIZE
              value: "2048"
            - name: IMAGE_RETENTION_HOURS
              value: "24"
            - name: INTERNAL_API_KEY
              valueFrom:
                secretKeyRef:
                  name: internal-api-key
                  key: api_key
            - name: INTERNAL_ALLOWED_IPS
              value: "192.168.0.0/24,10.43.0.0/16"
            - name: LOG_LEVEL
              value: "debug"
            - name: LOG_FORMAT
              value: "json"
            - name: RAW_TOKEN_DEBUG
              value: "true"
            - name: RAW_TOKEN_DEBUG_DIR
              value: "/tmp/llmmllab_debug"
            - name: API_VERSION
              value: "v1"
            - name: SEARX_HOST
              value: "http://searxng.searxng.svc.cluster.local:8080"
            - name: RUNNER_ENDPOINTS
              value:
                "http://llmmllab-runner.llmmllab.svc.cluster.local:8000,http://llmmllab-\
                runner-small.llmmllab.svc.cluster.local:8000"
            - name: RUNNER_RETRIES
              value: "5"
            - name: RUNNER_RETRY_BACKOFF_BASE
              value: "3"
            - name: STALE_SERVER_RETRIES
              value: "3"
            - name: RUNNER_MAX_ACQUIRE_FAILURES
              value: "5"
            - name: RUNNER_UNHEALTHY_WINDOW_SEC
              value: "120"
            - name: RUNNER_ACQUIRE_RETRIES
              value: "3"
            - name: RUNNER_ACQUIRE_TIMEOUT_SEC
              value: "300"
            - name: PORT
              value: "9999"
            - name: TEMPO_ENDPOINT
              value: "http://tempo.llmmllab.svc.cluster.local:4317"
            - name: CHAT_OPENAI_MAX_RETRIES
              value: "2"
            - name: CONTEXT_USAGE_SAFETY_MARGIN
              value: "0.85"
            - name: CONTEXT_MINIMUM_RATIO
              value: "0.80"
  strategy:
    type: Recreate
