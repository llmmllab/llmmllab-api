  runner-dashboard.json: |
    {
      "id": null,
      "uid": "llmmllab-runner",
      "title": "llmmllab-runner Dashboard",
      "tags": ["llmmllab", "runner"],
      "timezone": "browser",
      "schemaVersion": 39,
      "version": 1,
      "refresh": "30s",
      "panels": [
        {
          "id": 1,
          "title": "Active llama.cpp Servers",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 0},
          "targets": [
            {
              "expr": "llama_servers_active",
              "legendFormat": "{{runner_name}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "Server Starts",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 0},
          "targets": [
            {
              "expr": "sum(increase(llama_server_starts_total[1h])) by (model_id)",
              "legendFormat": "{{model_id}}"
            }
          ]
        },
        {
          "id": 3,
          "title": "GPU Temperature",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
          "targets": [
            {
              "expr": "gpu_temperature_celsius",
              "legendFormat": "GPU {{gpu_index}} ({{runner_name}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "celsius",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  {"color": "green", "value": null},
                  {"color": "yellow", "value": 70},
                  {"color": "orange", "value": 78},
                  {"color": "red", "value": 88}
                ]
              }
            }
          }
        },
        {
          "id": 4,
          "title": "GPU Memory Usage",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
          "targets": [
            {
              "expr": "gpu_memory_used_bytes",
              "legendFormat": "GPU {{gpu_index}} ({{runner_name}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "bytes"
            }
          }
        },
        {
          "id": 5,
          "title": "GPU Power",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
          "targets": [
            {
              "expr": "gpu_power_watts",
              "legendFormat": "GPU {{gpu_index}} ({{runner_name}})"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "watt"
            }
          }
        },
        {
          "id": 6,
          "title": "Server Evictions",
          "type": "stat",
          "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
          "targets": [
            {
              "expr": "sum(increase(llama_server_evictions_total[1h])) by (reason)",
              "legendFormat": "{{reason}}"
            }
          ]
        },
        {
          "id": 7,
          "title": "Request Rate",
          "type": "timeseries",
          "gridPos": {"h": 8, "w": 12, "x": 0, "y": 24},
          "targets": [
            {
              "expr": "sum(rate(http_requests_total[5m])) by (status, job)",
              "legendFormat": "{{job}} {{status}}"
            }
          ],
          "fieldConfig": {
            "defaults": {
              "unit": "reqps"
            }
          }
        },
        {
          "id": 8,
          "title": "Error Logs",
          "type": "logs",
          "gridPos": {"h": 8, "w": 24, "x": 0, "y": 32},
          "datasource": {"type": "loki", "uid": "loki"},
          "targets": [
            {
              "refId": "A",
              "expr": "{namespace=\"llmmllab\", app=~\"llmmllab-runner.*\", level=\"error\"} | json"
            }
          ],
          "options": {
            "showLabels": true,
            "showCommonLabels": true,
            "wrapLogMessage": true
          }
        }
      ]
    }
---
apiVersion: v1
kind: Secret
metadata:
  name: grafana-admin
  namespace: llmmllab
type: Opaque
stringData:
  admin-user: admin
  admin-password: llmmllab-admin
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: grafana-data
  namespace: llmmllab
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: llmmllab
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:12.0.0
          ports:
            - containerPort: 3000
              name: http
          env:
            - name: GF_SECURITY_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-user
            - name: GF_SECURITY_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: grafana-admin
                  key: admin-password
            - name: GF_AUTH_ANONYMOUS_ENABLED
              value: "false"
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "250m"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboards-config
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
            - name: data
              mountPath: /var/lib/grafana/data
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboards-config
          configMap:
            name: grafana-dashboards
            items:
              - key: dashboards.yaml
                path: dashboards.yaml
        - name: dashboards
          configMap:
            name: grafana-dashboards
            items:
              - key: api-dashboard.json
                path: api-dashboard.json
              - key: runner-dashboard.json
                path: runner-dashboard.json
        - name: data
          persistentVolumeClaim:
            claimName: grafana-data
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: llmmllab
  labels:
    app: grafana
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
      name: http
  type: ClusterIP
