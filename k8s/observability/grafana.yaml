# Grafana - dashboards and visualization
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: llmmllab
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.llmmllab.svc.cluster.local:9090
        isDefault: true
        editable: true
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.llmmllab.svc.cluster.local:3100
        editable: true
      - name: Tempo
        type: tempo
        access: proxy
        url: http://tempo.llmmllab.svc.cluster.local:3200
        editable: true
---
