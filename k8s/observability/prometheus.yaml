# Prometheus - scrapes /metrics from llmmllab-api and llmmllab-runner services
apiVersion: v1
kind: ServiceAccount
metadata:
  name: prometheus
  namespace: llmmllab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: prometheus
rules:
  - apiGroups: [""]
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/proxy"]
    verbs: ["get"]
  - nonResourceURLs: ["/metrics"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: prometheus
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: prometheus
subjects:
  - kind: ServiceAccount
    name: prometheus
    namespace: llmmllab
---
# Secret `prometheus-metrics-api-key` (key: `api-key`) must be created out-of-band:
#   kubectl create secret generic prometheus-metrics-api-key \
#     --from-literal=api-key=<YOUR_API_KEY> -n llmmllab
# Not declared here so `kubectl apply` can't overwrite the operator-set value.
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: llmmllab
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: "llmmllab-api"
        metrics_path: /metrics
        authorization:
          type: Bearer
          credentials_file: /etc/prometheus/secrets/api-key
        static_configs:
          - targets: ["llmmllab.llmmllab.svc.cluster.local:9999"]

      # Runner has no auth middleware; /metrics is open within the cluster.
      - job_name: "llmmllab-runner"
        metrics_path: /metrics
        static_configs:
          - targets: ["llmmllab-runner.llmmllab.svc.cluster.local:8000"]

      - job_name: "llmmllab-runner-small"
        metrics_path: /metrics
        static_configs:
          - targets: ["llmmllab-runner-small.llmmllab.svc.cluster.local:8000"]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: prometheus
  namespace: llmmllab
  labels:
    app: prometheus
spec:
  replicas: 1
  selector:
    matchLabels:
      app: prometheus
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: prometheus
    spec:
      serviceAccountName: prometheus
      containers:
        - name: prometheus
          image: prom/prometheus:v2.53.0
          args:
            - "--config.file=/etc/prometheus/prometheus.yml"
            - "--storage.tsdb.path=/prometheus"
            - "--storage.tsdb.retention.time=7d"
            - "--web.enable-lifecycle"
          ports:
            - containerPort: 9090
              name: http
          resources:
            requests:
              memory: "512Mi"
              cpu: "250m"
            limits:
              memory: "1Gi"
              cpu: "500m"
          volumeMounts:
            - name: config
              mountPath: /etc/prometheus
              readOnly: true
            - name: secrets
              mountPath: /etc/prometheus/secrets
              readOnly: true
            - name: data
              mountPath: /prometheus
      volumes:
        - name: config
          configMap:
            name: prometheus-config
        - name: secrets
          secret:
            secretName: prometheus-metrics-api-key
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: prometheus
  namespace: llmmllab
  labels:
    app: prometheus
spec:
  selector:
    app: prometheus
  ports:
    - port: 9090
      targetPort: 9090
      name: http
  type: ClusterIP
