# Promtail - log collector (DaemonSet) that ships pod logs to Loki
apiVersion: v1
kind: ServiceAccount
metadata:
  name: promtail
  namespace: llmmllab
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: promtail
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: promtail
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: promtail
subjects:
  - kind: ServiceAccount
    name: promtail
    namespace: llmmllab
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: promtail-config
  namespace: llmmllab
data:
  promtail.yaml: |
    server:
      http_listen_port: 9080

    positions:
      filename: /tmp/positions.yaml

    clients:
      - url: http://loki.llmmllab.svc.cluster.local:3100/loki/api/v1/push

    scrape_configs:
      - job_name: kubernetes-pods
        static_configs:
          - targets: ['localhost']
            labels:
              __path__: '/var/log/pods/llmmllab_llmmllab-api-*/*/*.log'
              namespace: 'llmmllab'
              app: 'llmmllab-api'
          - targets: ['localhost']
            labels:
              __path__: '/var/log/pods/llmmllab_llmmllab-runner-small-*/*/*.log'
              namespace: 'llmmllab'
              app: 'llmmllab-runner-small'
          - targets: ['localhost']
            labels:
              __path__: '/var/log/pods/llmmllab_llmmllab-runner-*/*/*.log'
              namespace: 'llmmllab'
              app: 'llmmllab-runner'
        pipeline_stages:
          # 1. Strip the CRI log prefix, capture clean message
          - regex:
              expression: '^[0-9T:.+-]+Z\s+(stdout|stderr)\s+[FP]\s+(?P<msg>.*)$'
          # 2. Parse the cleaned JSON log line for structured fields
          - json:
              source: "msg"
              expressions:
                level: level
                component: component
                request_id: request_id
                event: event
          # 3. Promote to labels
          - labels:
              level:
              component:
              request_id:
          # 4. Replace the line sent to Loki with the clean message
          - output:
              source: "msg"
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: promtail
  namespace: llmmllab
  labels:
    app: promtail
spec:
  selector:
    matchLabels:
      app: promtail
  template:
    metadata:
      labels:
        app: promtail
    spec:
      serviceAccountName: promtail
      tolerations:
        - operator: Exists  # Run on all nodes including GPU nodes
      containers:
        - name: promtail
          image: grafana/promtail:3.6.10
          args:
            - "-config.file=/etc/promtail/promtail.yaml"
          ports:
            - containerPort: 9080
              name: http
          resources:
            requests:
              memory: "64Mi"
              cpu: "50m"
            limits:
              memory: "128Mi"
              cpu: "100m"
          volumeMounts:
            - name: config
              mountPath: /etc/promtail
            - name: varlog
              mountPath: /var/log
              readOnly: true
            - name: varlibk3s
              mountPath: /var/lib/rancher/k3s
              readOnly: true
            - name: positions
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: promtail-config
        - name: varlog
          hostPath:
            path: /var/log
        - name: varlibk3s
          hostPath:
            path: /var/lib/rancher/k3s
        - name: positions
          emptyDir: {}
